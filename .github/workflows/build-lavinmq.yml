name: Build LavinMQ (macOS Focus)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'LavinMQ branch/tag'
        required: true
        default: 'main'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: cloudamqp/lavinmq
          ref: ${{ github.event.inputs.version }}

      - name: Install Dependencies
        run: |
          brew update
          brew install crystal openssl@3 pcre2 libevent bdw-gc

      - name: Patch Source Code (Type Inference Fix)
        run: |
          # Adiciona a anotação de tipo que o compilador exige
          # Substitui: @mt = Fiber::ExecutionContext::Parallel.new
          # Por: @mt : Fiber::ExecutionContext::Parallel = Fiber::ExecutionContext::Parallel.new
          sed -i '' 's/@mt = Fiber::ExecutionContext::Parallel.new/@mt : Fiber::ExecutionContext::Parallel = Fiber::ExecutionContext::Parallel.new/g' src/lavinmq/clustering/server.cr

      - name: Build LavinMQ
        run: |
          shards install --production
          # Adicionamos -Dpreview_mt e o patch garante a tipagem estrita
          crystal build src/lavinmq.cr -Dpreview_mt --release --no-debug \
            --link-flags="$(brew --prefix openssl@3)/lib/libssl.a \
                          $(brew --prefix openssl@3)/lib/libcrypto.a \
                          $(brew --prefix pcre2)/lib/libpcre2-8.a \
                          $(brew --prefix libevent)/lib/libevent.a \
                          $(brew --prefix bdw-gc)/lib/libgc.a"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavinmq-macos
          path: lavinmq