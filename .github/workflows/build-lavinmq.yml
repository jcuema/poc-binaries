name: Build LavinMQ (macOS Focus)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'LavinMQ branch/tag'
        required: true
        default: 'main'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: cloudamqp/lavinmq
          ref: ${{ github.event.inputs.version }}

      - name: Install Dependencies
        run: |
          brew update
          brew install crystal openssl@3 pcre2 libevent bdw-gc

      - name: Patch Source Code (Type Inference Fix)
        run: |
          # Adiciona a anotação de tipo que o compilador exige
          # Substitui: @mt = Fiber::ExecutionContext::Parallel.new
          # Por: @mt : Fiber::ExecutionContext::Parallel = Fiber::ExecutionContext::Parallel.new
          sed -i '' 's/@mt = Fiber::ExecutionContext::Parallel.new/@mt : Fiber::ExecutionContext::Parallel = Fiber::ExecutionContext::Parallel.new/g' src/lavinmq/clustering/server.cr

      - name: Build LavinMQ using Makefile
        run: |
          shards install --production
          # O makefile do LavinMQ geralmente já tem o -Dpreview_mt e as flags certas
          make release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavinmq-macos
          path: lavinmq