name: Build and Release LavinMQ (Static)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'LavinMQ Release Tag (ex: v2.8.1)'
        required: true
        default: 'v2.8.1'

env:
  LAVINMQ_VERSION: ${{ github.event.inputs.version || 'v2.8.1' }}

jobs:
  build-macos:
    name: Build macOS (ARM64)
    runs-on: macos-14 # Importante: macos-14 roda nativamente em Apple Silicon (ARM64)
    steps:
      - name: Checkout LavinMQ Source
        uses: actions/checkout@v4
        with:
          repository: cloudamqp/lavinmq
          ref: ${{ env.LAVINMQ_VERSION }}

      - name: Install Dependencies
        run: |
          brew update
          brew install crystal openssl@3 pcre2 libevent bdw-gc

      - name: Build LavinMQ (Semi-Static)
        run: |
          shards install --production
          # Força o linker a usar os arquivos .a estáticos do Homebrew ao invés dos .dylib dinâmicos
          crystal build src/lavinmq.cr --release --no-debug \
            --link-flags="$(brew --prefix openssl@3)/lib/libssl.a \
                          $(brew --prefix openssl@3)/lib/libcrypto.a \
                          $(brew --prefix pcre2)/lib/libpcre2-8.a \
                          $(brew --prefix libevent)/lib/libevent.a \
                          $(brew --prefix bdw-gc)/lib/libgc.a"

      - name: Package Artifact
        run: |
          FOLDER_NAME="lavinmq-${{ env.LAVINMQ_VERSION }}-darwin-arm64"
          mkdir -p $FOLDER_NAME/bin
          mv lavinmq $FOLDER_NAME/bin/
          tar -czvf $FOLDER_NAME.tar.gz $FOLDER_NAME/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavinmq-darwin-arm64
          path: lavinmq-*.tar.gz

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout LavinMQ Source
        uses: actions/checkout@v4
        with:
          repository: cloudamqp/lavinmq
          ref: ${{ env.LAVINMQ_VERSION }}

      - name: Set up QEMU (For ARM64 Cross-Compilation)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build LavinMQ (100% Static in Alpine)
        run: |
          # Utiliza o Alpine para compilar com musl libc, garantindo portabilidade total
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            crystallang/crystal:latest-alpine \
            /bin/sh -c "
              apk add --no-cache yaml-static openssl-libs-static pcre2-dev zlib-static libevent-static gc-dev &&
              shards install --production &&
              crystal build src/lavinmq.cr --release --no-debug --static
            "

      - name: Package Artifact
        run: |
          FOLDER_NAME="lavinmq-${{ env.LAVINMQ_VERSION }}-linux-${{ matrix.arch }}"
          mkdir -p $FOLDER_NAME/bin
          mv lavinmq $FOLDER_NAME/bin/
          tar -czvf $FOLDER_NAME.tar.gz $FOLDER_NAME/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavinmq-linux-${{ matrix.arch }}
          path: lavinmq-*.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LAVINMQ_VERSION }}
          name: "LavinMQ ${{ env.LAVINMQ_VERSION }}"
          draft: false
          prerelease: false
          files: artifacts/lavinmq-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}